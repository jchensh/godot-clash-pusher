# 生产/公网 overlay（KAN-110 E2-lite，2026-07-16）—— 叠加在基础 compose 之上使用：
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 只新增 Caddy TLS 反代 + 全员 restart 策略；不改基础编排（本地开发不受影响，
# 不带本文件启动 = 原样纯 HTTP 开发环境）。环境值全部来自 .env（拷贝 .env.example 填写）。
#
# ⚠️ 公网机器防火墙只开 80/443（Caddy）；8080/8081/5432/6379 一律不开
#    ——基础 compose 为开发便利仍把这些端口发布到宿主机，公网安全靠防火墙收口，
#    完整清单见 docs/deployment/GCP_RELEASE_TLS.md。

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"   # HTTP/3
    environment:
      DOMAIN: ${DOMAIN:?请在 .env 设置 DOMAIN（本地冒烟用 localhost）}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./docker/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # 证书与 ACME 账号（务必持久化，防续期风暴）
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - api
      - gateway

  # 公网机器上全员自动重启（开发机不带本 overlay 不受影响）
  postgres:
    restart: unless-stopped
  redis:
    restart: unless-stopped
  gateway:
    restart: unless-stopped
  api:
    restart: unless-stopped
  battle:
    restart: unless-stopped
  verifier:
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
